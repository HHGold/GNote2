<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GNote2 — 線上筆記編輯器</title>
  <meta name="description" content="GNote2 線上版，使用 Google 帳號登入，與手機 App 資料完全同步的筆記編輯器。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- 登入頁面 -->
  <div id="login-screen" class="screen active">
    <div class="login-bg">
      <div class="login-orb orb1"></div>
      <div class="login-orb orb2"></div>
      <div class="login-orb orb3"></div>
    </div>
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-icon">📒</div>
        <h1 class="logo-title">GNote<span>2</span></h1>
        <p class="logo-subtitle">您的雲端筆記，隨時隨地同步</p>
      </div>
      <button id="btn-google-login" class="btn-google">
        <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        使用 Google 帳號登入
      </button>
      <p class="login-hint">登入後即可與手機 App 資料完全同步</p>
    </div>
  </div>

  <!-- 主應用 -->
  <div id="app-screen" class="screen">
    <!-- 側邊欄 -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <div class="user-info">
          <img id="user-avatar" src="" alt="頭像" class="user-avatar" />
          <div class="user-details">
            <span id="user-name" class="user-name"></span>
            <span id="user-email" class="user-email"></span>
          </div>
        </div>
        <button id="btn-logout" class="btn-icon" title="登出">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>

      <div class="search-box">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input id="search-input" type="text" placeholder="搜尋筆記..." class="search-input" />
      </div>

      <div class="folders-section">
        <div class="section-title">
          <span>資料夾</span>
          <button id="btn-add-folder" class="btn-icon-sm" title="新增資料夾">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
          </button>
        </div>
        <ul id="folder-list" class="folder-list"></ul>
      </div>
    </aside>

    <!-- 側邊欄遮罩（行動版） -->
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <!-- 主內容區 -->
    <main class="main-content">
      <!-- 筆記列表面板 -->
      <div id="notes-panel" class="notes-panel">
        <div class="notes-panel-header">
          <button id="btn-menu" class="btn-icon mobile-only" title="選單">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/>
              <line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
          </button>
          <h2 id="current-folder-name" class="panel-title">全部</h2>
          <button id="btn-new-note" class="btn-new-note" title="新增筆記">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M12 5H7a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-5"/>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
          </button>
        </div>
        <ul id="notes-list" class="notes-list"></ul>
        <div id="notes-empty" class="empty-state" style="display:none;">
          <div class="empty-icon">📝</div>
          <p>此資料夾沒有筆記</p>
          <span>點擊右上角 ✏️ 新增一篇</span>
        </div>
      </div>

      <!-- 編輯器面板 -->
      <div id="editor-panel" class="editor-panel">
        <div id="editor-placeholder" class="editor-placeholder">
          <div class="placeholder-icon">✨</div>
          <p>選擇一篇筆記開始編輯</p>
          <span>或點擊「+」新增筆記</span>
        </div>
        <div id="editor-area" class="editor-area" style="display:none;">
          <div class="editor-toolbar">
            <div class="editor-toolbar-left">
              <button id="btn-back-mobile" class="btn-icon mobile-only" title="返回">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                  <polyline points="15 18 9 12 15 6"/>
                </svg>
              </button>
              <div class="save-indicator" id="save-indicator">
                <span class="save-dot"></span>
                <span id="save-status">已儲存</span>
              </div>
            </div>
            <div class="editor-toolbar-right">
              <button id="btn-delete-note" class="btn-danger-icon" title="刪除筆記">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="3 6 5 6 21 6"/>
                  <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                  <path d="M10 11v6"/><path d="M14 11v6"/>
                  <path d="M9 6V4h6v2"/>
                </svg>
              </button>
            </div>
          </div>
          <input id="note-title" type="text" class="note-title-input" placeholder="標題..." />
          <textarea id="note-content" class="note-content-input" placeholder="開始輸入您的筆記..."></textarea>
          <div class="editor-meta">
            <span id="note-meta-time">–</span>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- 新增資料夾對話框 -->
  <div id="modal-add-folder" class="modal-overlay" style="display:none;">
    <div class="modal-card">
      <h3 class="modal-title">新增資料夾</h3>
      <input id="input-folder-name" type="text" class="modal-input" placeholder="資料夾名稱..." maxlength="30" />
      <div class="modal-actions">
        <button id="btn-cancel-folder" class="btn-modal-cancel">取消</button>
        <button id="btn-confirm-folder" class="btn-modal-confirm">新增</button>
      </div>
    </div>
  </div>

  <!-- 重新命名對話框 -->
  <div id="modal-rename-folder" class="modal-overlay" style="display:none;">
    <div class="modal-card">
      <h3 class="modal-title">重新命名資料夾</h3>
      <input id="input-rename-folder" type="text" class="modal-input" placeholder="新名稱..." maxlength="30" />
      <div class="modal-actions">
        <button id="btn-cancel-rename" class="btn-modal-cancel">取消</button>
        <button id="btn-confirm-rename" class="btn-modal-confirm">確認</button>
      </div>
    </div>
  </div>

  <!-- 確認刪除對話框 -->
  <div id="modal-confirm-delete" class="modal-overlay" style="display:none;">
    <div class="modal-card">
      <h3 class="modal-title">確認刪除</h3>
      <p id="modal-delete-msg" class="modal-msg">確定要刪除此筆記嗎？此操作無法復原。</p>
      <div class="modal-actions">
        <button id="btn-cancel-delete" class="btn-modal-cancel">取消</button>
        <button id="btn-confirm-delete" class="btn-modal-confirm btn-delete">刪除</button>
      </div>
    </div>
  </div>

  <!-- Toast 通知 -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Firebase & App JS -->
  <script type="module" src="app.js"></script>
</body>
</html>
